version: "2"
sql:
  - engine: "postgresql"
    queries: "backend/db/queries"
    schema: "backend/db/migrations"
    gen:
      go:
        package: "dbq"
        out: "backend/db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true